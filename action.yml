name: PolicyPress
description: Build ISMS policy PDFs and a Zola static site from markdown content.
author: sc2in

branding:
  icon: shield
  color: blue

inputs:
  config_path:
    description: Path to the Zola config.toml file.
    required: false
    default: config.toml
  output_dir:
    description: Output directory for PDFs and reports.
    required: false
    default: public
  draft_mode:
    description: >
      Set to 'true' to stamp PDFs with a DRAFT watermark.
      Set to 'false' (default) to produce clean production PDFs.
    required: false
    default: "false"
  redact_mode:
    description: >
      Set to 'true' to redact content inside redaction shortcode tags.
      Set to 'false' (default) to include all content.
    required: false
    default: "false"
  generate_draft_pdfs:
    description: >
      Set to 'true' to also generate a second set of PDFs stamped with a DRAFT
      watermark (same redact_mode as the official run). Use this when your site
      config has show_draft_pdfs = true so that draft buttons have valid files
      to link to.
    required: false
    default: "false"
  base_url:
    description: >
      Override the base_url from config.toml (e.g. a Cloudflare Pages preview
      URL). When set, passed to 'zola build --base-url' so that all get_url()
      calls resolve against this origin instead of the production domain.
    required: false
    default: ""

outputs:
  pdf_path:
    description: Path to the directory containing generated PDFs.
    value: ${{ steps.build.outputs.pdf_path }}
  site_path:
    description: Path to the directory containing the built static site.
    value: ${{ steps.build.outputs.site_path }}
  report_path:
    description: Path to the directory containing compliance reports.
    value: ${{ steps.build.outputs.report_path }}

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: DeterminateSystems/determinate-nix-action@v3
      with:
        extra-conf: |
          sandbox = false

    - name: Setup Nix cache
      continue-on-error: true
      uses: DeterminateSystems/flakehub-cache-action@main

    - name: Get action ref
      id: get-ref
      shell: bash
      run: echo "ref=${{ github.action_ref }}" >> $GITHUB_OUTPUT

    - name: Fetch policypress theme
      uses: actions/checkout@v4
      with:
        repository: sc2in/policypress
        ref: ${{ steps.get-ref.outputs.ref }}
        path: themes/policypress

    - name: Install policypress binary
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        case "$(uname -s)-$(uname -m)" in
          Linux-x86_64)   BINARY="policypress-x86_64-linux" ;;
          Linux-aarch64)  BINARY="policypress-aarch64-linux" ;;
          Darwin-arm64)   BINARY="policypress-aarch64-macos" ;;
          Darwin-x86_64)  BINARY="policypress-x86_64-macos" ;;
          *)
            echo "Unsupported platform: $(uname -s)-$(uname -m)"
            exit 1
            ;;
        esac

        mkdir -p "${RUNNER_TEMP}/policypress-bin"
        gh release download \
          --repo sc2in/policypress \
          --pattern "${BINARY}" \
          --dir "${RUNNER_TEMP}/policypress-bin"
        mv "${RUNNER_TEMP}/policypress-bin/${BINARY}" \
           "${RUNNER_TEMP}/policypress-bin/policypress"
        chmod +x "${RUNNER_TEMP}/policypress-bin/policypress"
        echo "${RUNNER_TEMP}/policypress-bin" >> "${GITHUB_PATH}"

    - name: Copy pandoc templates
      shell: bash
      run: |
        # pandoc looks for eisvogel.latex in {data-dir}/templates/ (where
        # data-dir defaults to the site root). Copy it from the theme so
        # consumers don't need to vendor it.
        mkdir -p templates
        cp -n themes/policypress/templates/eisvogel.latex templates/
        cp -n themes/policypress/templates/eisvogel.pdf templates/ 2>/dev/null || true

    - name: Copy theme shortcodes
      shell: bash
      run: |
        # Zola does not reliably load shortcodes from theme directories when
        # the site also has a templates/ dir. Copy them to the site root so
        # they are always found. -n preserves any site-level overrides.
        mkdir -p templates/shortcodes
        cp -n themes/policypress/templates/shortcodes/*.html templates/shortcodes/

    - name: Copy theme data files
      shell: bash
      run: |
        # Zola's load_data resolves paths from the site root, not the theme.
        # Copy the theme's data files so report templates (SCF, TSC2017, etc.)
        # can find them. -n preserves any site-local overrides.
        if [ -d themes/policypress/data ]; then
          mkdir -p data
          cp -n themes/policypress/data/* data/
        fi

    - name: Copy draft watermark
      shell: bash
      run: |
        # The policypress binary looks for static/draft.png at the site root.
        # Copy it from the theme so draft-mode builds work without the consumer
        # having to vendor the asset. -n preserves any site-local override.
        mkdir -p static
        cp -n themes/policypress/static/draft.png static/ 2>/dev/null || true

    - name: Build site and PDFs
      id: build
      shell: nix develop "github:sc2in/policypress#ci" --command bash -e {0}
      run: |
        set -euo pipefail

        # Build the Zola static site
        ZOLA_ARGS=()
        if [ -n "${{ inputs.base_url }}" ]; then
          ZOLA_ARGS+=(--base-url "${{ inputs.base_url }}")
        fi
        zola build "${ZOLA_ARGS[@]}"

        # Build flags - explicitly set draft/redact so action inputs always
        # override whatever is in the consumer's config.toml.
        ARGS=(-c "${{ inputs.config_path }}" -o "${{ inputs.output_dir }}/pdfs")
        if [ "${{ inputs.draft_mode }}" = "true" ]; then
          ARGS+=(--draft)
        else
          ARGS+=(--no-draft)
        fi
        if [ "${{ inputs.redact_mode }}" = "true" ]; then
          ARGS+=(--redact)
        else
          ARGS+=(--no-redact)
        fi

        # policypress binary is pre-installed from the release; deps are in the ci shell
        policypress "${ARGS[@]}"

        # Optionally generate a second draft-watermarked set of PDFs so that
        # sites with show_draft_pdfs = true have valid files to link to.
        if [ "${{ inputs.generate_draft_pdfs }}" = "true" ]; then
          DRAFT_ARGS=(-c "${{ inputs.config_path }}" -o "${{ inputs.output_dir }}/pdfs" --draft)
          if [ "${{ inputs.redact_mode }}" = "true" ]; then
            DRAFT_ARGS+=(--redact)
          else
            DRAFT_ARGS+=(--no-redact)
          fi
          policypress "${DRAFT_ARGS[@]}"
        fi

        echo "pdf_path=${{ inputs.output_dir }}/pdfs"    >> "$GITHUB_OUTPUT"
        echo "site_path=public"                          >> "$GITHUB_OUTPUT"
        echo "report_path=${{ inputs.output_dir }}/reports" >> "$GITHUB_OUTPUT"
