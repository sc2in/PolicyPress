<div class="revisions">
  <h3>Revisions</h3>
  <div class="table-responsive">
  <table>
    <tr><th>Version
      </th><th>Date
      </th><th>Description
      </th><th>Revised by
      </th><th>Approved by
    </th></tr>

    {% for version in versions %}
    <tr>

      <td>
        v{{version.version}}
      </td>
      <td>
        {{version.date | date(format="%b %d, %Y")}}
      </td>
      <td>
        {{version.description | default(value="")}}
      </td>
      <td>
        {{version.revised_by | default(value="")}}
      </td>
      <td>
        {{version.approved_by | default(value="")}}
      </td>
  </tr>
    {% endfor %}

  </table>
  </div>
</div>
