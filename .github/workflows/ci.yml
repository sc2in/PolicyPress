name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      id-token: "write"
      contents: "write"
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Setup Nix cache
        uses: DeterminateSystems/flakehub-cache-action@main
        with:
          use-gha-cache: "enabled"
          flakehub-flake-name: "sc2in/PolicyPress"

      - name: Install omnix
        run: nix --accept-flake-config profile add nixpkgs#omnix

      - name: Run CI
        run: om ci run --include-all-dependencies

      - name: Collect artifacts
        if: ${{ success() }}
        run: |
          mkdir -p artifacts
          nix build --no-link --print-out-paths .# | xargs -I{} cp -rL {}/ artifacts/

      - name: Upload artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: policypress
          path: artifacts/
          retention-days: 7

      - name: Create release archive
        if: ${{ success() && github.ref_type == 'tag' }}
        run: |
          tar czf policypress-${{ github.ref_name }}.tar.gz -C artifacts .

      - name: Create GitHub Release
        if: ${{ success() && github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: policypress-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
