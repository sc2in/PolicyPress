ci:
  default:
    root:
      dir: .
      steps:
        build:
          enable: true
        flake-check:
          enable: true

develop:
  default:
    readme: |
      🏛️ Welcome to **PolicyPress**

      Commands:
        om ci         - Run full CI locally
        zig build     - Build the project
        zola serve    - Live preview the site

health:
  default:
    nix-version:
      supported: ">=2.16.0"
