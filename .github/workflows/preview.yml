name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Compute preview URL
        id: preview_url
        run: |
          # CF Pages preview URLs are deterministic: https://<branch>.<project>.pages.dev
          # Branch names are lowercased and non-alphanumeric chars become hyphens.
          BRANCH="pr-${{ github.event.pull_request.number }}"
          echo "url=https://${BRANCH}.policypress.pages.dev" >> "$GITHUB_OUTPUT"

      - name: Build site and PDFs
        uses: ./
        with:
          config_path: config.toml
          redact_mode: "true"
          generate_draft_pdfs: "true"
          base_url: ${{ steps.preview_url.outputs.url }}

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=policypress --branch=pr-${{ github.event.pull_request.number }} --commit-dirty=true

      - name: Post preview URL to PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- policypress-preview -->';
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const body = `${marker}\n## Preview deployment\n\n🔗 ${url}\n\n_Last updated: ${new Date().toUTCString()}_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Delete Cloudflare Pages preview deployments
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          BRANCH="pr-${{ github.event.pull_request.number }}"
          PROJECT="policypress"

          IDS=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT}/deployments?per_page=25" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | \
            jq -r ".result[] | select(.deployment_trigger.metadata.branch == \"${BRANCH}\") | .id")

          if [ -z "$IDS" ]; then
            echo "No deployments found for branch ${BRANCH}, nothing to clean up."
            exit 0
          fi

          for ID in $IDS; do
            echo "Deleting deployment ${ID}..."
            curl -sf -X DELETE \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT}/deployments/${ID}?force=true" \
              -H "Authorization: Bearer ${CF_API_TOKEN}"
          done

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- policypress-preview -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: `${marker}\n## Preview deployment\n\n_Preview environment deleted on PR close._`,
              });
            }
