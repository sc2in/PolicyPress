title: facility
impacts:
  - impact: high
    confidentiality: No physical access control exists allowing non-authorized persons to access SC2 facilities potentially leading to unauthorized disclosure.
    integrity: Annual or periodic maintenance of physical facilities and/or environmental systems is not completed.
    availability: No disaster recovery plan has been created for the local facility. If the facility is lost SC2  services and customers will be negatively impacted.
  - impact: medium
    confidentiality: Access to facilities by external maintenance personnel is unregulated.
    integrity: Annual or periodic maintenance of physical facilities and/or environmental systems occurs but is not reviewed or audited.
    availability: BCP /DRP site has been identified but is not regularly tested to validate its capability or effectiveness.
  - impact: low
    confidentiality: Access to facilities by non-local SC2 employees is uncontrolled.
    integrity: Annual or periodic maintenance of physical facilities and/or environmental systems has been completed and regularly reviewed.
    availability: A BCP and DRP plan exists and is tested annually.
