title: software
impacts:
  - impact: high
    confidentiality: Hardware vulnerabilities are not assessed or managed.
    integrity: Incidents and problems frequently occur and go uncorrected for extended periods of time impacting Recovery Time Objectives.
    availability: Hardware capacity planning has not been completed or validated.
  - impact: medium
    confidentiality: Incidents and problems impacting hardware are not consistently remediated.
    integrity: Installation and configuration of hardware has not been tested or validated.
    availability: Hardware standards for implementation and testing have not been documented.
  - impact: low
    confidentiality: Hardware vulnerabilities are consistently identified and managed.
    integrity: The installation and configuration of hardware is consistently tested or validated.
    availability: Hardware standards for implementation and testing are documented and managed.
