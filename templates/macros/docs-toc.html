{% macro docs_toc(page) %}
{% if page.toc %}
<nav class="docs-toc policy-toc" aria-label="On this page">
  <div class="page-links">
    <h3>On this page</h3>
    <ul role="list">
      {% for h1 in page.toc %}
      <li>
        <a href="{{ h1.permalink | safe }}">{{ h1.title }}</a>
        {% if h1.children %}
        <ul>
          {% for h2 in h1.children %}
          <li><a href="{{ h2.permalink | safe }}">{{ h2.title }}</a></li>
          {% endfor %}
        </ul>
        {% endif %}
      </li>
      {% endfor %}
    </ul>
  </div>
</nav>
{% endif %}
{% endmacro %}
