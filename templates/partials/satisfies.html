<div class="satisfies">
  <h3>Satisfies</h3>
  {% for name, tax in page.taxonomies %}
  {% set taxo = get_taxonomy(kind=name) %}
  <label for="{{name}}"><a href="{{ taxo.permalink }}">{{name}}</a></label>
  <ul id="{{name}}">
        {% for item in taxo.items %}
        <li><a href="{{ taxo.permalink }}#{{ item.name }}">{{item.name}}</a></li>
        {% endfor %}        
    </ul>
    {% endfor %}
</div>
